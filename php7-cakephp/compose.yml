services:
  app:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - .:/var/www/html
    environment:
      - DEBUG=true
    depends_on:
      - db

  db:
    image: mysql:5.7
    platform: linux/amd64
    #ports:
    #  - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cake_app
      MYSQL_USER: cake_user
      MYSQL_PASSWORD: password

  obi:
    image: docker.io/otel/ebpf-instrument:main
    pid: 'host'
    privileged: true
    environment:
      OTEL_EBPF_CONFIG_PATH: "/configs/obi-config.yml"
    volumes:
      - ./obi-config.yml:/configs/obi-config.yml

  otel-collector:
    image: mackerel/otelcol-mackerel:latest
    environment:
      MACKEREL_APIKEY: "${MACKEREL_APIKEY}"
      OTELCOL_MACKEREL_HOST: otel-collector
