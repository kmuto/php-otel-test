services:
  mackerel:
    image: mackerel/otelcol-mackerel:latest
    environment:
      MACKEREL_APIKEY: "${MACKEREL_APIKEY}"
      OTELCOL_MACKEREL_HOST: mackerel

  app:
    build:
      context: ../..
      dockerfile: examples/laravel8/Dockerfile
    volumes:
      - ../../src/Instrumentation/Laravel:/usr/src/instrumentation-laravel
      - ./src:/app
    environment:
      - OTEL_SERVICE_NAME=laravel8-php74-demo
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://mackerel:4318
      - OTEL_PHP_AUTOLOAD_ENABLED=true
      - OTEL_PHP_TRACES_PROCESSOR=simple
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=php-demo
 
  db:
    image: mariadb:10.6
    environment:
      MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: 1
      MARIADB_DATABASE: laravel
    volumes:
      - laravel-php74-demo-db:/var/lib/mysql

  nginx:
    image: nginx:alpine
    ports:
      - "8002:8002"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  laravel-php74-demo-db:
